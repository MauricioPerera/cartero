# cartero.ardf.dev — Cartero public endpoints:
#   /.well-known/postal/<user>.json  -> signed handle bindings (static, CORS)
#   /sub (SSE) + /pub (POST)         -> the untrusted real-time relay (127.0.0.1:8790)
# TLS terminated at Cloudflare edge; origin cert = ardf.dev apex (same as the other vhosts).
# Deployed at /etc/nginx/sites-available/cartero.ardf.dev (symlinked into sites-enabled).
server {
    listen 80;
    listen [::]:80;
    server_name cartero.ardf.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cartero.ardf.dev;

    ssl_certificate /etc/letsencrypt/live/ardf.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ardf.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Handle bindings — public JSON, browser-fetchable.
    location /.well-known/postal/ {
        alias /var/www/cartero/well-known-postal/;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # Relay subscribe — Server-Sent Events: no buffering, long-lived.
    location = /sub {
        proxy_pass http://127.0.0.1:8790/sub;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering "no";
    }

    # Relay publish — POST {chat,event}.
    location = /pub {
        proxy_pass http://127.0.0.1:8790/pub;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 5m;
    }

    location = / { default_type text/plain; return 200 "cartero: relay + handles\n"; }
}
